<!DOCTYPE html>
<html>
<head>

<title>Linear Regression</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
}

.container{
width:700px;
margin:auto;
background:white;
padding:20px;
margin-top:30px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
padding:10px 20px;
background:blue;
color:white;
border:none;
cursor:pointer;
}

img{
width:100%;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h2 align="center">Linear Regression</h2>

<form method="POST">

<label>X Values</label>

<input
type="text"
name="x"
placeholder="1,2,3,4"
required>

<label>Y Values</label>

<input
type="text"
name="y"
placeholder="2,3,5,4"
required>

<button type="submit">
Calculate
</button>

</form>

{% if result %}

<hr>

<h3>Result</h3>

<p><b>Regression Equation:</b> {{result.equation}}</p>

<p><b>MSE:</b> {{result.mse}}</p>

<p><b>MAE:</b> {{result.mae}}</p>

<p><b>RMSE:</b> {{result.rmse}}</p>

<p><b>R² Score:</b> {{result.r2}}</p>

<h3>Linear Regression Graph</h3>

<img src="{{url_for('static',filename='regression.png')}}">

<h3>Performance Evaluation</h3>

<img src="{{url_for('static',filename='performance.png')}}">

{% endif %}

</div>

</body>
</html>
